<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIPH Tech Theater</title>
    <link rel="icon" href="icons/light-icon.png">
    <link rel="stylesheet" href="common-styles.css">
    <style>
        :root {
            --accent: #4bdbff;
            --accent-dark: #3b7ccc;
        }

        body {
            background: #0a0a0a;
            color: #eee;
        }

        .hero {
            height: 520px;
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.85)), 
                        url('images/backstage.jpg') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            margin: -20px -20px 60px;
            border-bottom: 1px solid var(--border);
        }

        .hero-content {
            max-width: 720px;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 4.2rem;
            line-height: 75%;
            font-weight: 200;
            letter-spacing: -2px;
            margin-bottom: 12px;
            color: white;
        }

        .hero p {
            font-size: 1.35rem;
            color: #ccc;
            margin-bottom: 32px;
        }

        .cta-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 32px;
            font-size: 1.1rem;
            border-radius: 9999px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
        }

        .btn-primary:hover {
            background: white;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: transparent;
            color: white;
            border: 2px solid rgba(255,255,255,0.6);
        }

        .btn-secondary:hover {
            border-color: white;
            transform: translateY(-1px);
            background: rgba(255,255,255,0.1);
        }

        /* Logo */
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .quick-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 80px;
            justify-items: center;
        }

        .link-card {
            width: 70%;
            max-width: 1000px;
            min-width: 500px;
            margin: 0 auto;
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 16px;
            padding: 32px 28px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            color: inherit;
            overflow: hidden;
            box-shadow: 0 2px 50px 0px rgba(75, 204, 255, 0.10);
            z-index: 10;
        }

        .link-card:hover {
            box-shadow: 0 2px 50px 5px rgba(75, 204, 255, 0.3);
            border-color: var(--accent);
        }

        .link-card .icon {
            font-size: 3.8rem;
            margin-bottom: 5px;
            margin-top: -20px;
            transition: all 0.4s ease;
            display: block;
        }

        .link-card:hover .icon {
            transform: rotate(0.2deg);
            color: var(--accent);
        }

        .link-card h3 {
            font-size: 1.65rem;
            margin-bottom: 12px;
            color: white;
            transition: color 0.3s ease;
        }

        .link-card:hover h3 {
            color: var(--accent);
        }

        .link-card h3 {
            position: relative;
            display: inline-block;
        }

        .link-card h3::after {
            content: '';
            position: absolute;
            bottom: 6px; 
            left: 0;
            width: 100%;
            height: 1.5px;
            background: var(--accent);
            opacity: 0;
            transform: scaleX(0.95); 
            transition: all 0.35s ease;
        }

        .link-card h3:hover::after {
            opacity: 1;
            transform: scaleX(1);
        }

        .link-card p {
            color: var(--muted);
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div id="shared-menu"></div>
    <script src="menu.js"></script>

<header>
    <div class="logo-container">
        <div class="logo-icon" style="width: 90px; height: 78px; margin-top: 5px; margin-right: -18px;">
            <img src="icons/TechTheaterLogo.png" style="height: 80px;" alt="BIPH Tech Theater Logo">
        </div>
        <div>
            <div class="header-logo" style="line-height: 85%; margin-bottom: 18px; margin-left: -1px;">BIPH Technical Theatre</div>
            <div class="header-subtitle">2026-2027</div>
        </div>
    </div>
</header>

    <section class="hero">
        <div class="hero-content">
            <h1>Find your crew</h1>
            <p>Lighting • Sound • Video • Programming • Event Design</p>
            <div class="cta-buttons">
                <a href="https://biphtechtheater.github.io/tutorials/" class="btn btn-primary">Browse Tutorials</a>
                <a href="https://biphtechtheater.github.io/files/" class="btn btn-secondary">Latest Files</a>
            </div>
        </div>
    </section>

    <main style="max-width: 1280px; margin: 0 auto; padding: 0 20px;">
        
        <div class="quick-links">
            <a href="https://biphtechtheater.github.io/events" class="link-card">
                <div class="icon">📅</div>
                <h3>Upcoming Events</h3>
                <p>Concerts, drama shows, club outputs, sporting events, games, art installations, you name it!</p>
            </a>
        </div>
        
        <div class="biph-logocontainer">        
            <img src="icons/Full Logo White on Transparent.png" class="biph-logo">
        </div>
    </main>
</body>
</html>
