<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23ffffff'/%3E%3Cpath d='M5 50h90a45 45 0 0 0-90 0z' fill='%23ff0000'/%3E%3Ccircle cx='50' cy='50' r='10' fill='%23000000'/%3E%3Ccircle cx='50' cy='50' r='45' fill='none' stroke='%23000000' stroke-width='2'/%3E%3Cline x1='5' y1='50' x2='95' y2='50' stroke='%23000000' stroke-width='3'/%3E%3C/svg%3E">
    <style>
        @font-face {
            font-family: 'Zapfino';
            src: url('../fonts/Zapfino.ttf') format('truetype');

        body {
            background-color: rgb(45, 70, 119);
            font-family: 'Andika', sans-serif;

            margin: 0;

            position: fixed;

.top-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;

}

.hamburger {
    font-size: 34px;

#hamburgerMenu select option {

}

        .header {
            display: flex;

            gap: 12px;

            justify-content: center;
        }

        .Subtitle {
            font-family: 'Zapfino', cursive;

.mode-toggle {
    font-size: 1.1rem;

    user-select: none;
    display: inline-block;        /* Critical fix */
    padding: 6px 16px;

}
.mode-toggle:hover {
    color: white;

        .container {

            display: flex;

            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            margin-bottom: 50px;

        #addEntryBtn {
            padding: 9px 18px;

            border: none;
            border-radius: 4px;

            background: #45a049;
        }

        #leaderboard {
            list-style: none;
            padding: 0;
            margin: 8px 0;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .entry {
            background: rgba(255, 255, 255, 0.1);
            padding: 0px 14px;
            margin: 3px 0;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.18);
            transition: transform 0.9s cubic-bezier(0.22, 0.81, 0.35, 1), opacity 0.9s ease-out;
            position: relative;
            overflow: hidden;
            min-height: 48px;
        }

        .entry.gold::before,
        .entry.silver::before,
        .entry.bronze::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -150%;
            width: 60%;
            height: 300%;
            background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.35) 50%, transparent 70%);
            animation: shine 2.8s linear infinite;
            pointer-events: none;
        }

        .entry.gold {
            background: linear-gradient(45deg, #d4af37b4, #ffd9008f, #b8870b8f);
            border: 2px solid #ffd700;
            box-shadow: 0 0 18px rgba(255, 215, 0, 0.75);
        }
        .entry.silver {
            background: linear-gradient(45deg, #c0c0c0b9, #e5e5e5a9, #a8a8a89d);
            border: 2px solid #c0c0c0;
            box-shadow: 0 0 18px rgba(192, 192, 192, 0.65);
        }
        .entry.bronze {
            background: linear-gradient(45deg, #cd8032af, #e8b5889f, #b36b24b4);
            border: 2px solid #cd7f32;
            box-shadow: 0 0 18px rgba(205, 127, 50, 0.65);
        }

        @keyframes shine {
            0%   { transform: translateX(-120%) translateY(-50%); }
            100% { transform: translateX(420%) translateY(-50%); }
        }

        .rank { font-weight: bold; width: 26px; text-align: right; padding-right: 10px; }
        .name { flex: 1; text-align: left; }
        .name .grade { font-weight: normal; color: #ddd; margin-left: 0.5em; }
        .weight { width: 135px; text-align: right; font-weight: 500; }

        .modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.78); 
            z-index: 1000; 
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: linear-gradient(145deg, rgba(45,70,119,0.98), rgba(25,45,85,0.98));
            margin: 15px;
            padding: 28px 24px;
            border-radius: 12px;
            width: 90%;
            max-width: 460px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .modal-stage {
            display: none;
        }
        .modal-stage.active {
            display: block;
        }

        #entryForm input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: white;
            font-size: 1.05rem;
            box-sizing: border-box;
        }

        #suggestions, .suggestions-coop {
            list-style: none;
            padding: 0;
            margin: 4px 0 14px 0;
            max-height: 240px;
            overflow-y: auto;
            background: rgba(0,0,0,0.4);
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.12);
        }

        #suggestions li, .suggestions-coop li {
            padding: 12px 16px;
            text-align: left;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        #suggestions li:last-child, .suggestions-coop li:last-child {
            border-bottom: none;
        }

        #suggestions li:hover,
        #suggestions li.highlighted,
        .suggestions-coop li:hover,
        .suggestions-coop li.highlighted {
            background: rgba(255,255,255,0.18);
        }

        #selectedNameDisplay {
            font-size: 1.4rem;
            margin: 12px 0 16px 0;
            padding: 14px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            min-height: 32px;
        }

        #startBtn, #submitBtn {
            background: linear-gradient(90deg, #ffcc00, #ff9900);
            color: #000;
            font-weight: bold;
            font-size: 1.35rem;
            padding: 16px 28px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 0 #cc7700;
            width: 100%;
            margin-top: 8px;
        }
        #startBtn:hover, #submitBtn:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #cc7700; }
        #startBtn:active, #submitBtn:active { transform: translateY(3px); box-shadow: 0 3px 0 #cc7700; }
        #startBtn:disabled, #submitBtn:disabled {
            background: #555;
            color: #aaa;
            box-shadow: 0 4px 0 #333;
            cursor: not-allowed;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="background"></div>
    
    <div class="container">
        <div class="top-bar">
            <span class="hamburger" id="hamburger">☰</span>
            <div class="header">
                <svg viewBox="0 0 100 100" width="42" height="42">
                    <circle cx="50" cy="50" r="45" fill="white"/>
                    <path d="M5 50h90a45 45 0 0 0-90 0z" fill="red"/>
                    <circle cx="50" cy="50" r="10" fill="black"/>
                    <circle cx="50" cy="50" r="45" fill="none" stroke="black" stroke-width="2"/>
                    <line x1="5" y1="50" x2="95" y2="50" stroke="black" stroke-width="3"/>
                </svg>
                <h1>Pokeball Challenge</h1>
            </div>
        </div>
        
        <h2 class="Subtitle">Leaderboard</h2>
        <div id="modeToggle" class="mode-toggle">Single Player</div>
        
        <ul id="leaderboard"></ul>
        <button id="addEntryBtn">Add New Entry</button>
    </div>

<!-- Hamburger Menu -->
<div id="hamburgerMenu" style="display:none; position:fixed; top:75px; left:20px; background:rgba(0,0,0,0.92); border-radius:10px; padding:12px; z-index:1100; box-shadow: 0 4px 20px rgba(0,0,0,0.6); min-width:260px;">
    <div style="margin-bottom:12px; font-size:1.1rem; color:#ddd; padding:4px 8px;">Menu</div>
    
    <button id="resetBtn" style="width:100%; background:rgba(180,40,40,0.9); border:none; color:white; padding:12px; border-radius:6px; cursor:pointer; font-size:1.05rem; margin-bottom:12px;">
        Reset Leaderboard
    </button>

    <div style="border-top:1px solid rgba(255,255,255,0.15); padding-top:12px;">
        <div style="margin-bottom:8px; font-size:1.05rem; color:#ddd; padding:4px 8px;">MIDI Diagnostics</div>
        
        <div id="midiStatus" style="padding:10px 12px; background:rgba(255,255,255,0.08); border-radius:6px; margin-bottom:10px; font-size:0.95rem; text-align:left;">
            Initializing...
        </div>

        <select id="midiDeviceSelect" style="width:100%; padding:10px; background:rgba(255,255,255,0.1); color:white; border:1px solid rgba(255,255,255,0.2); border-radius:6px; margin-bottom:8px;">
        </select>

        <button id="refreshMidiBtn" style="width:100%; padding:10px; background:rgba(255,255,255,0.15); color:white; border:none; border-radius:6px; cursor:pointer;">
            Refresh MIDI Devices
        </button>
    </div>
</div>

    <div id="entryModal" class="modal">
        <div class="modal-content">
            <form id="entryForm">
                <!-- Stage 1 -->
                <div id="stage1" class="modal-stage active">
                    <div id="singleInputs">
                        <input type="text" id="entrantInput" placeholder="Enter name or ID" autocomplete="off">
                        <ul id="suggestions"></ul>
                    </div>
                    
                    <div id="coopInputs" style="display: none;">
                        <input type="text" id="player1Input" placeholder="Player 1 Name" autocomplete="off">
                        <ul id="suggestions1" class="suggestions-coop"></ul>
                        <input type="text" id="player2Input" placeholder="Player 2 Name" autocomplete="off">
                        <ul id="suggestions2" class="suggestions-coop"></ul>
                    </div>

                    <button type="button" id="startBtn" disabled>Start</button>
                </div>

                <!-- Stage 2 -->
                <div id="stage2" class="modal-stage">
                    <div id="selectedNameDisplay"></div>
                    <input type="number" id="weight" placeholder="Pokeballs collected" required min="1" style="font-size: 1.45rem; padding: 18px 16px; text-align:center;">
                    <button type="button" id="submitBtn">Submit Entry</button>
                </div>
            </form>
        </div>
    </div>

    <script>
    // ====================== MIDI ======================
    let midiAccess = null;
    let midiOutput = null;

    function sendMIDINote(note, velocity = 127, channel = 13) {
        if (!midiOutput) return;
        const status = 0x90 | (channel & 0x0F);
        midiOutput.send([status, note, velocity]);
        setTimeout(() => midiOutput.send([0x80 | (channel & 0x0F), note, 0]), 80);
    }

    async function initMIDI() {
        try {
            midiAccess = await navigator.requestMIDIAccess({ sysex: false });
            setupMIDI();
        } catch (e) {
            console.error("MIDI init failed", e);
        }
    }

function setupMIDI() {
    if (!midiAccess) return;
    
    const outputs = Array.from(midiAccess.outputs.values());
    if (outputs.length > 0) {
        // Prefer IAC Driver Bus 1, fallback to first device
        midiOutput = outputs.find(o => o.name.includes('IAC Driver Bus 1')) || outputs[0];
    }

    midiAccess.inputs.forEach(input => input.onmidimessage = handleMIDIMessage);
    midiAccess.onstatechange = () => {
        setupMIDI();
        if (document.getElementById('hamburgerMenu').style.display === 'block') {
            updateMIDIDiagnostics();
        }
    };
}

    function handleMIDIMessage(msg) {
        const data = msg.data;
        const status = data[0];
        const note = data[1];
        const vel = data[2];

        if ((status & 0xF0) !== 0x90 || vel === 0) return;
        if ((status & 0x0F) !== 13) return;

        if (note === 0 && document.getElementById('stage1').classList.contains('active')) {
            triggerStart();
        } 
        else if (note === 127 && document.getElementById('stage2').classList.contains('active')) {
            submitEntry();
        } 
        else if (note >= 1 && note <= 126 && document.getElementById('stage2').classList.contains('active')) {
            document.getElementById('weight').value = note;
        }
    }

    // ====================== MIDI DIAGNOSTICS ======================
function updateMIDIDiagnostics() {
    const statusEl = document.getElementById('midiStatus');
    const select = document.getElementById('midiDeviceSelect');

    if (!midiAccess) {
        statusEl.innerHTML = `<span style="color:#ff6666;">❌ MIDI not available</span>`;
        select.innerHTML = '<option>No MIDI support</option>';
        return;
    }

    const outputs = Array.from(midiAccess.outputs.values());
    statusEl.innerHTML = outputs.length > 0 
        ? `<span style="color:#66ff99;">✅ Connected (${outputs.length} output${outputs.length>1?'s':''})</span>`
        : `<span style="color:#ffcc66;">⚠️ No MIDI outputs found</span>`;

    select.innerHTML = '';
    
    outputs.forEach(output => {
        const option = document.createElement('option');
        option.value = output.id;
        option.textContent = output.name;
        if (output.name.includes('IAC Driver Bus 1') || 
            (midiOutput && midiOutput.id === output.id)) {
            option.selected = true;
        }
        select.appendChild(option);
    });

    // Auto-select IAC if available
    if (!midiOutput && outputs.length > 0) {
        const iac = outputs.find(o => o.name.includes('IAC Driver Bus 1'));
        if (iac) midiOutput = iac;
    }
}

// Handle device selection
document.getElementById('midiDeviceSelect').addEventListener('change', (e) => {
    if (!midiAccess) return;
    const selectedId = e.target.value;
    const outputs = Array.from(midiAccess.outputs.values());
    midiOutput = outputs.find(out => out.id === selectedId) || null;
    
    if (midiOutput) {
        console.log(`MIDI output switched to: ${midiOutput.name}`);
    }
});

document.getElementById('refreshMidiBtn').addEventListener('click', () => {
    if (midiAccess) {
        setupMIDI();           // Refresh list
        updateMIDIDiagnostics();
    }
});

    // ====================== DATA ======================
    let currentMode = "single";
    let singleLeaderboard = JSON.parse(localStorage.getItem('singleLeaderboard')) || [];
    let coopLeaderboard = JSON.parse(localStorage.getItem('coopLeaderboard')) || [];
    let additional_entrants = JSON.parse(localStorage.getItem('additional_entrants')) || [];
    let all_entrants = [];
    let previousLeaderboard = [];
    const ROW_HEIGHT = 54;
    let currentHighlightIndex = -1;

    function saveLeaderboard() {
        localStorage.setItem(currentMode === "single" ? 'singleLeaderboard' : 'coopLeaderboard', 
            JSON.stringify(currentMode === "single" ? singleLeaderboard : coopLeaderboard));
    }

    function saveAdditionalEntrants() {
        localStorage.setItem('additional_entrants', JSON.stringify(additional_entrants));
    }

    function getDisplayName(entry) {
        if (entry.player1 && entry.player2) return `${entry.player1} & ${entry.player2}`;
        return entry.grade ? `${entry.name} <span class="grade">(${entry.grade})</span>` : entry.name;
    }

    function calculateRankings(entries) {
        if (!entries.length) return [];
        const ranked = [];
        let rank = 1;
        ranked.push({ ...entries[0], place: 1 });
        for (let i = 1; i < entries.length; i++) {
            if (entries[i].weight < entries[i-1].weight) rank++;
            ranked.push({ ...entries[i], place: rank });
        }
        return ranked;
    }

    function getMedalClass(p) {
        if (p===1) return 'gold';
        if (p===2) return 'silver';
        if (p===3) return 'bronze';
        return '';
    }

    function renderLeaderboard() {
        const ul = document.getElementById('leaderboard');
        ul.innerHTML = '';
        const board = currentMode === "single" ? singleLeaderboard : coopLeaderboard;
        const ranked = calculateRankings(board);
        
        let nextRank = ranked.length ? ranked[ranked.length-1].place + 1 : 1;
        const itemsToShow = Math.min(Math.max(10, ranked.length), 20);

        for (let i = 0; i < itemsToShow; i++) {
            const entry = ranked[i];
            const li = document.createElement('li');
            li.className = 'entry';
            if (entry) {
                const medal = getMedalClass(entry.place);
                if (medal) li.classList.add(medal);
                li.innerHTML = `
                    <span class="rank">${entry.place}.</span>
                    <span class="name">${getDisplayName(entry)}</span>
                    <span class="weight">${entry.weight} collected</span>
                `;
            } else {
                li.innerHTML = `<span class="rank">${nextRank}.</span><span class="name">--</span><span class="weight">--</span>`;
                nextRank++;
            }
            ul.appendChild(li);
        }
    }

    // ====================== MODAL ======================
    const modal = document.getElementById('entryModal');
    let currentSelectedEntry = null;

    function openModal() {
        modal.style.display = 'flex';
        resetToStage1();
        setTimeout(() => {
            if (currentMode === "single") document.getElementById('entrantInput').focus();
            else document.getElementById('player1Input').focus();
        }, 100);
    }

    function resetToStage1() {
        document.getElementById('stage1').classList.add('active');
        document.getElementById('stage2').classList.remove('active');

        document.getElementById('singleInputs').style.display = currentMode === "single" ? "block" : "none";
        document.getElementById('coopInputs').style.display = currentMode === "coop" ? "block" : "none";

        document.getElementById('entrantInput').value = '';
        document.getElementById('player1Input').value = '';
        document.getElementById('player2Input').value = '';
        document.getElementById('weight').value = '';
        document.getElementById('suggestions').innerHTML = '';
        document.getElementById('suggestions1').innerHTML = '';
        document.getElementById('suggestions2').innerHTML = '';

        document.getElementById('startBtn').disabled = true;
        currentSelectedEntry = null;
        currentHighlightIndex = -1;
    }

    function triggerStart() {
        if (document.getElementById('startBtn').disabled) return;
        sendMIDINote(0);

        if (currentMode === "single") {
            const val = document.getElementById('entrantInput').value.trim();
            if (!val) return;
            currentSelectedEntry = { name: val, id: document.getElementById('entrantInput').dataset.id || null };
        } else {
            const p1 = document.getElementById('player1Input').value.trim();
            const p2 = document.getElementById('player2Input').value.trim();
            if (!p1 || !p2) return;
            currentSelectedEntry = { player1: p1, player2: p2, name: `${p1} & ${p2}` };
        }

        document.getElementById('selectedNameDisplay').innerHTML = `<strong>${currentSelectedEntry.name}</strong>`;
        document.getElementById('stage1').classList.remove('active');
        document.getElementById('stage2').classList.add('active');
        setTimeout(() => document.getElementById('weight').focus(), 80);
    }

    function submitEntry() {
        const weightVal = parseInt(document.getElementById('weight').value);
        if (!weightVal || weightVal < 1) return;

        if (window.lastSubmitTime && Date.now() - window.lastSubmitTime < 300) return;
        window.lastSubmitTime = Date.now();

        sendMIDINote(127);

        const board = currentMode === "single" ? singleLeaderboard : coopLeaderboard;
        let shouldCelebrate = false;

        if (currentMode === "single") {
            let { name, id } = currentSelectedEntry;
            if (!id) {
                const match = all_entrants.find(e => e.name.toLowerCase() === name.toLowerCase());
                id = match ? match.id : 'CUST-' + Date.now().toString(36).slice(-6).toUpperCase();
                if (!match) {
                    additional_entrants.push({id, name});
                    all_entrants.push({id, name});
                    saveAdditionalEntrants();
                }
            }

            const idx = board.findIndex(e => e.id === id);
            if (idx >= 0) {
                if (weightVal > board[idx].weight) {
                    board[idx].weight = weightVal;
                    shouldCelebrate = true;
                }
            } else {
                const entry = {id, name, weight: weightVal};
                const src = all_entrants.find(e => e.id === id);
                if (src?.grade) entry.grade = src.grade;
                board.push(entry);
                shouldCelebrate = true;
            }
        } else {
            const id = 'COOP-' + Date.now().toString(36).slice(-8).toUpperCase();
            board.push({
                id,
                player1: currentSelectedEntry.player1,
                player2: currentSelectedEntry.player2,
                name: currentSelectedEntry.name,
                weight: weightVal
            });
            shouldCelebrate = true;
        }

        board.sort((a,b) => b.weight - a.weight);
        saveLeaderboard();
        renderLeaderboard();

        if (shouldCelebrate) confetti({particleCount: 300, spread: 110, origin: {y: 0.55}});

        modal.style.display = 'none';
    }

    // ====================== SUGGESTIONS ======================
    function showSuggestions(inputId, listId) {
        const input = document.getElementById(inputId);
        const val = input.value.trim().toLowerCase();
        const ul = document.getElementById(listId);
        ul.innerHTML = '';
        currentHighlightIndex = -1;

        if (!val) {
            checkStartEnabled();
            return;
        }

        const matches = all_entrants.filter(e => 
            e.name.toLowerCase().includes(val) || (e.id && e.id.toLowerCase().startsWith(val))
        ).sort((a,b) => a.name.toLowerCase().localeCompare(b.name.toLowerCase()));

        matches.forEach((entry, i) => {
            const li = document.createElement('li');
            li.innerHTML = entry.name + (entry.id ? ` <span class="id">(${entry.id})</span>` : '');
            li.dataset.index = i;
            li.onclick = () => {
                input.value = entry.name;
                if (inputId === 'entrantInput') input.dataset.id = entry.id || '';
                ul.innerHTML = '';
                checkStartEnabled();
            };
            ul.appendChild(li);
        });

        if (matches.length > 0) highlightSuggestion(0, listId);
        checkStartEnabled();
    }

    function highlightSuggestion(index, listId) {
        const ul = document.getElementById(listId);
        const items = ul.children;
        if (!items.length) return;
        currentHighlightIndex = Math.max(0, Math.min(index, items.length - 1));
        Array.from(items).forEach((item, i) => {
            item.classList.toggle('highlighted', i === currentHighlightIndex);
        });
    }

    function checkStartEnabled() {
        const btn = document.getElementById('startBtn');
        if (currentMode === "single") {
            btn.disabled = !document.getElementById('entrantInput').value.trim();
        } else {
            const p1 = document.getElementById('player1Input').value.trim();
            const p2 = document.getElementById('player2Input').value.trim();
            btn.disabled = !(p1 && p2);
        }
    }

    // ====================== EVENTS ======================
    document.getElementById('addEntryBtn').onclick = openModal;
    document.getElementById('startBtn').onclick = triggerStart;
    document.getElementById('submitBtn').onclick = submitEntry;

    // Single Player
    const entrantInput = document.getElementById('entrantInput');
    entrantInput.addEventListener('input', () => showSuggestions('entrantInput', 'suggestions'));
    entrantInput.addEventListener('keydown', e => {
        const ul = document.getElementById('suggestions');
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            highlightSuggestion(currentHighlightIndex + 1, 'suggestions');
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            highlightSuggestion(currentHighlightIndex - 1, 'suggestions');
        } else if (e.key === 'Enter') {
            e.preventDefault();
            const items = ul.children;
            if (currentHighlightIndex >= 0 && items[currentHighlightIndex]) {
                items[currentHighlightIndex].click();
            } else if (items.length > 0) {
                items[0].click();
            } else {
                triggerStart();
            }
        }
    });

    // Co-op with auto-focus
    const player1Input = document.getElementById('player1Input');
    const player2Input = document.getElementById('player2Input');

    player1Input.addEventListener('input', () => showSuggestions('player1Input', 'suggestions1'));
    player1Input.addEventListener('keydown', e => {
        const ul = document.getElementById('suggestions1');
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            highlightSuggestion(currentHighlightIndex + 1, 'suggestions1');
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            highlightSuggestion(currentHighlightIndex - 1, 'suggestions1');
        } else if (e.key === 'Enter') {
            e.preventDefault();
            const items = ul.children;
            if (currentHighlightIndex >= 0 && items[currentHighlightIndex]) items[currentHighlightIndex].click();
            else if (items.length > 0) items[0].click();
            setTimeout(() => player2Input.focus(), 60);
        }
    });

player2Input.addEventListener('input', () => showSuggestions('player2Input', 'suggestions2'));
player2Input.addEventListener('keydown', e => {
    const ul = document.getElementById('suggestions2');
    if (e.key === 'ArrowDown') {
        e.preventDefault();
        highlightSuggestion(currentHighlightIndex + 1, 'suggestions2');
    } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        highlightSuggestion(currentHighlightIndex - 1, 'suggestions2');
    } else if (e.key === 'Enter') {
        e.preventDefault();
        const items = ul.children;
        if (currentHighlightIndex >= 0 && items[currentHighlightIndex]) {
            items[currentHighlightIndex].click();
        } else if (items.length > 0) {
            items[0].click();
        }
        // Just enable the Start button — do NOT auto-start
        checkStartEnabled();
    }
});

    // Weight field
    const weightInput = document.getElementById('weight');
    weightInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
            e.preventDefault();
            submitEntry();
        } else if (e.key === ' ') {
            e.preventDefault();
            let current = parseInt(weightInput.value) || 0;
            weightInput.value = current + 1;
            sendMIDINote(current + 1);
        }
    });

    // Mode Toggle
    const modeToggle = document.getElementById('modeToggle');
    function toggleMode() {
        currentMode = currentMode === "single" ? "coop" : "single";
        modeToggle.textContent = currentMode === "single" ? "Single Player" : "Co-op";
        renderLeaderboard();
    }
    modeToggle.addEventListener('click', toggleMode);

    document.addEventListener('keydown', e => {
        if (e.metaKey && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
            e.preventDefault();
            toggleMode();
        }
        if (e.key === 'Escape' && modal.style.display === 'flex') modal.style.display = 'none';
        if ((e.key === 'n' || e.key === '+') && modal.style.display !== 'flex' && !['INPUT','TEXTAREA'].includes(e.target.tagName)) {
            e.preventDefault();
            openModal();
        }
    });

    document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        const menu = document.getElementById('hamburgerMenu');
        if (menu.style.display === 'block') {
            menu.style.display = 'none';
            e.preventDefault();
        } 
        else if (modal.style.display === 'flex') {
            modal.style.display = 'none';
        }
    }
});

    // Trigger start when Enter is pressed while player2 field is focused
document.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;

    const active = document.activeElement;
    if (!active || active !== player2Input) return; // only when player2 is focused

    // prevent your existing Enter behavior from interfering
    e.preventDefault();
    e.stopPropagation();

    // only start if both players are filled
    const p1 = player1Input.value.trim();
    const p2 = player2Input.value.trim();
    if (p1 && p2) triggerStart();
});

document.getElementById('hamburger').addEventListener('click', (e) => {
    e.stopPropagation(); // Prevent immediate close from window.onclick
    const menu = document.getElementById('hamburgerMenu');
    menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    
    if (menu.style.display === 'block') {
        updateMIDIDiagnostics();
    }
});

    let resetConfirm = false;
    document.getElementById('resetBtn').onclick = () => {
        const resetBtn = document.getElementById('resetBtn');
        if (!resetConfirm) {
            resetConfirm = true;
            resetBtn.textContent = "Confirm Reset?";
        } else {
            if (currentMode === "single") singleLeaderboard = [];
            else coopLeaderboard = [];
            saveLeaderboard();
            renderLeaderboard();
            document.getElementById('resetMenu').style.display = 'none';
            resetConfirm = false;
            resetBtn.textContent = "Reset Leaderboard";
        }
    };

window.onclick = e => {
    if (e.target === modal) {
        modal.style.display = 'none';
        return;
    }

    const menu = document.getElementById('hamburgerMenu');
    const hamburger = document.getElementById('hamburger');

    // Close menu when clicking outside
    if (menu.style.display === 'block' && 
        !hamburger.contains(e.target) && 
        !menu.contains(e.target)) {
        menu.style.display = 'none';
    }
};

    // Initialize
    window.addEventListener('load', () => {
        initMIDI();
        fetch('students.json')
            .then(r => r.json())
            .then(students => {
                all_entrants = [...students, ...additional_entrants];
                renderLeaderboard();
            })
            .catch(() => {
                all_entrants = [...additional_entrants];
                renderLeaderboard();
            });
    });
</script>
</body>
</html>
