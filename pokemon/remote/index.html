<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gotta Catch 'em All - Remote</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23ffffff'/%3E%3Cpath d='M5 50h90a45 45 0 0 0-90 0z' fill='%23ff0000'/%3E%3Ccircle cx='50' cy='50' r='10' fill='%23000000'/%3E%3Ccircle cx='50' cy='50' r='45' fill='none' stroke='%23000000' stroke-width='2'/%3E%3Cline x1='5' y1='50' x2='95' y2='50' stroke='%23000000' stroke-width='3'/%3E%3C/svg%3E">
    <style>
        @font-face {
            font-family: 'Zapfino';
            src: url('../fonts/Zapfino.ttf') format('truetype');
        }
        body {
            background-color: rgb(45, 70, 119);
            font-family: 'Andika', sans-serif;
            color: #ffffff;
            margin: 0;
            padding: 15px;
            line-height: 1.5;
            text-align: center;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .background {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, rgb(45, 70, 119), rgb(9, 32, 79));
            opacity: 0.8;
            z-index: -2;
        }
       
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .Subtitle {
            font-family: 'Zapfino', cursive;
            color: white;
            font-size: 32px;
            margin: 0;
        }

        .mode-toggle {
            font-size: 1.1rem;
            color: #ddd;
            margin: 6px 0 16px 0;
            cursor: pointer;
            user-select: none;
        }
        .mode-toggle:hover {
            color: white;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            margin-bottom: 50px;
        }

        #addEntryBtn {
            padding: 9px 18px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            align-self: flex-end;
        }
        #addEntryBtn:hover {
            background: #45a049;
        }

        #leaderboard {
            list-style: none;
            padding: 0;
            margin: 8px 0;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .entry {
            background: rgba(255, 255, 255, 0.1);
            padding: 0px 14px;
            margin: 3px 0;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.18);
            transition: transform 0.9s cubic-bezier(0.22, 0.81, 0.35, 1), opacity 0.9s ease-out;
            position: relative;
            overflow: hidden;
            min-height: 48px;
        }

        .entry.gold::before,
        .entry.silver::before,
        .entry.bronze::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -150%;
            width: 60%;
            height: 300%;
            background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.35) 50%, transparent 70%);
            animation: shine 2.8s linear infinite;
            pointer-events: none;
        }

        .entry.gold {
            background: linear-gradient(45deg, #d4af37b4, #ffd9008f, #b8870b8f);
            border: 2px solid #ffd700;
            box-shadow: 0 0 18px rgba(255, 215, 0, 0.75);
        }
        .entry.silver {
            background: linear-gradient(45deg, #c0c0c0b9, #e5e5e5a9, #a8a8a89d);
            border: 2px solid #c0c0c0;
            box-shadow: 0 0 18px rgba(192, 192, 192, 0.65);
        }
        .entry.bronze {
            background: linear-gradient(45deg, #cd8032af, #e8b5889f, #b36b24b4);
            border: 2px solid #cd7f32;
            box-shadow: 0 0 18px rgba(205, 127, 50, 0.65);
        }

        @keyframes shine {
            0%   { transform: translateX(-120%) translateY(-50%); }
            100% { transform: translateX(420%) translateY(-50%); }
        }

        .rank {
            font-weight: bold;
            width: 26px;
            text-align: right;
            padding-right: 10px;
        }
        .name {
            flex: 1;
            text-align: left;
        }
        .name .grade {
            font-weight: normal;
            color: #ddd;
            margin-left: 0.5em;
        }
        .weight {
            width: 135px;
            text-align: right;
            font-weight: 500;
        }

        .modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.75); 
            z-index: 1000; 
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: linear-gradient(145deg, rgba(45,70,119,0.98), rgba(25,45,85,0.98));
            margin: 20px;
            padding: 32px 28px;
            border-radius: 12px;
            width: 90%;
            max-width: 480px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        #entryForm input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 14px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: white;
            font-size: 1.05rem;
            box-sizing: border-box;
        }

        #suggestions {
            list-style: none;
            padding: 0;
            margin: 2px 0 14px 0;
            max-height: 260px;
            overflow-y: auto;
            background: rgba(0,0,0,0.35);
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.12);
        }

        #suggestions li {
            padding: 12px 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        #suggestions li:last-child {
            border-bottom: none;
        }

        #suggestions li:hover,
        #suggestions li.highlighted {
            background: rgba(255,255,255,0.15);
            color: white;
        }

        #resetBtn {
            color: rgba(255, 255, 255, 0.749);
            width: auto !important; 
            padding: 10px 18px !important;
            font-size: 1rem !important;
            margin-top: 16px !important;
            margin-left: auto !important;
            display: block;
            background: rgba(180, 40, 40, 0.8) !important;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="background"></div>
    
    <div class="container">
        <div class="header">
            <svg class="w-8 h-8 mr-2" viewBox="0 0 100 100" width="42" height="42">
                <circle cx="50" cy="50" r="45" fill="white"/>
                <path d="M5 50h90a45 45 0 0 0-90 0z" fill="red"/>
                <circle cx="50" cy="50" r="10" fill="black"/>
                <circle cx="50" cy="50" r="45" fill="none" stroke="black" stroke-width="2"/>
                <line x1="5" y1="50" x2="95" y2="50" stroke="black" stroke-width="3"/>
            </svg>
            <h1>Pokeball Challenge</h1>
        </div>
        
        <h2 class="Subtitle">Leaderboard</h2>
        <div id="modeToggle" class="mode-toggle">Single Player</div>
        
        <ul id="leaderboard"></ul>
        <button id="addEntryBtn">Add New Entry</button>
    </div>

    <div id="entryModal" class="modal">
        <div class="modal-content">
            <form id="entryForm">
                <div id="singleInputs">
                    <input type="text" id="entrantInput" placeholder="Enter name or ID" autocomplete="off">
                    <ul id="suggestions"></ul>
                </div>
                
                <div id="coopInputs" style="display: none;">
                    <input type="text" id="player1Input" placeholder="Player 1 Name" autocomplete="off">
                    <input type="text" id="player2Input" placeholder="Player 2 Name" autocomplete="off">
                </div>

                <input type="number" id="weight" placeholder="Pokeballs collected" required min="1">
                <button type="submit">Submit Entry</button>
            </form>
            <button id="resetBtn">Reset</button>
        </div>
    </div>

    <script>
        const channel = new BroadcastChannel('pokeball_leaderboard');

        let currentMode = "single";
        let singleLeaderboard = JSON.parse(localStorage.getItem('singleLeaderboard')) || [];
        let coopLeaderboard = JSON.parse(localStorage.getItem('coopLeaderboard')) || [];
        let additional_entrants = JSON.parse(localStorage.getItem('additional_entrants')) || [];
        let all_entrants = [];
        let previousLeaderboard = [];
        const ROW_HEIGHT = 54;
        let currentHighlightIndex = -1;

        function broadcastUpdate() {
            channel.postMessage({
                mode: currentMode,
                leaderboard: currentMode === "single" ? singleLeaderboard : coopLeaderboard
            });
        }

        function saveLeaderboard() {
            if (currentMode === "single") {
                localStorage.setItem('singleLeaderboard', JSON.stringify(singleLeaderboard));
            } else {
                localStorage.setItem('coopLeaderboard', JSON.stringify(coopLeaderboard));
            }
            broadcastUpdate();
        }

        function saveAdditionalEntrants() {
            localStorage.setItem('additional_entrants', JSON.stringify(additional_entrants));
        }

        function getDisplayName(entry) {
            if (entry.player1 && entry.player2) {
                return `${entry.player1} & ${entry.player2}`;
            }
            return entry.grade ? `${entry.name} <span class="grade">(${entry.grade})</span>` : entry.name;
        }

        function calculateRankings(entries) {
            if (!entries.length) return [];
            const ranked = [];
            let rank = 1;
            ranked.push({ ...entries[0], place: 1 });
            for (let i = 1; i < entries.length; i++) {
                const current = entries[i];
                const previous = entries[i - 1];
                if (current.weight < previous.weight) rank += 1;
                ranked.push({ ...current, place: rank });
            }
            return ranked;
        }

        function getMedalClass(place) {
            if (place === 1) return 'gold';
            if (place === 2) return 'silver';
            if (place === 3) return 'bronze';
            return '';
        }

        function renderLeaderboard(animate = false) {
            const ul = document.getElementById('leaderboard');
            ul.innerHTML = '';
            
            const activeBoard = currentMode === "single" ? singleLeaderboard : coopLeaderboard;
            const rankedLeaderboard = calculateRankings(activeBoard);
            
            let nextRank = 1;
            if (rankedLeaderboard.length > 0) {
                nextRank = rankedLeaderboard[rankedLeaderboard.length - 1].place + 1;
            }
            const displayCount = Math.max(10, rankedLeaderboard.length);
            const itemsToShow = Math.min(displayCount, 20);

            const prevPos = new Map();
            previousLeaderboard.forEach((e, i) => {
                if (e?.id) prevPos.set(e.id, i);
            });

            let newEntryId = null;
            if (animate) {
                const prevIds = new Set(previousLeaderboard.map(e => e?.id).filter(Boolean));
                newEntryId = activeBoard.find(e => !prevIds.has(e.id))?.id;
            }

            const elements = [];
            for (let i = 0; i < itemsToShow; i++) {
                const entry = rankedLeaderboard[i];
                const li = document.createElement('li');
                li.className = 'entry';

                if (entry) {
                    const medal = getMedalClass(entry.place);
                    if (medal) li.classList.add(medal);
                    li.dataset.id = entry.id;
                    li.innerHTML = `
                        <span class="rank">${entry.place}.</span>
                        <span class="name">${getDisplayName(entry)}</span>
                        <span class="weight">${entry.weight} collected</span>
                    `;

                    if (animate) {
                        const oldIndex = prevPos.get(entry.id);
                        if (oldIndex === undefined) {
                            li.classList.add('new-entry');
                            newEntryId = entry.id;
                        } else if (oldIndex !== i) {
                            li.classList.add('moving');
                            const diff = i - oldIndex;
                            li.style.transform = `translateY(${diff * -ROW_HEIGHT}px)`;
                        }
                    }
                } else {
                    li.classList.add('placeholder');
                    li.innerHTML = `
                        <span class="rank">${nextRank}.</span>
                        <span class="name">--</span>
                        <span class="weight">-- </span>
                    `;
                    nextRank++;
                }
                elements.push(li);
            }

            elements.forEach(el => ul.appendChild(el));

            if (animate) {
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        document.querySelectorAll('.entry.moving').forEach(el => {
                            el.style.transform = '';
                        });
                    });
                });
                if (newEntryId) {
                    setTimeout(() => {
                        document.querySelectorAll('.entry').forEach(el => {
                            if (el.dataset.id === newEntryId) {
                                el.classList.remove('new-entry');
                            }
                        });
                    }, 950);
                }
            }

            previousLeaderboard = [...activeBoard];
        }

        function capitalizeName(name) {
            return name.trim().split(' ')
                .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
                .join(' ');
        }

        function showSuggestions() {
            const input = document.getElementById('entrantInput');
            const value = (input ? input.value : '').trim().toLowerCase();
            const ul = document.getElementById('suggestions');
            ul.innerHTML = '';
            currentHighlightIndex = -1;

            if (!value) return;

            const matches = all_entrants.filter(e =>
                e.name.toLowerCase().includes(value) ||
                (e.id && e.id.toLowerCase().startsWith(value))
            ).sort((a, b) => {
                const aName = a.name.toLowerCase();
                const bName = b.name.toLowerCase();
                const aStart = aName.startsWith(value) ? -2 : 0;
                const bStart = bName.startsWith(value) ? -2 : 0;
                const aContain = aName.includes(value) ? -1 : 0;
                const bContain = bName.includes(value) ? -1 : 0;
                if (aStart !== bStart) return aStart - bStart;
                if (aContain !== bContain) return aContain - bContain;
                return aName.localeCompare(bName);
            });

            matches.forEach((e, i) => {
                const li = document.createElement('li');
                let txt = e.name;
                if (e.id) txt += ` <span class="id">(${e.id})</span>`;
                if (e.grade) txt += ` <span class="grade">${e.grade}</span>`;
                li.innerHTML = txt;
                li.dataset.index = i;
                li.addEventListener('click', () => selectSuggestion(e));
                ul.appendChild(li);
            });

            if (ul.children.length > 0) {
                highlightSuggestion(0);
            }
        }

        function highlightSuggestion(index) {
            const ul = document.getElementById('suggestions');
            const items = ul.children;
            if (!items.length) return;
            currentHighlightIndex = Math.max(0, Math.min(index, items.length - 1));
            Array.from(items).forEach((item, i) => {
                item.classList.toggle('highlighted', i === currentHighlightIndex);
            });
        }

        function selectSuggestion(entry) {
            const input = document.getElementById('entrantInput');
            input.value = entry.name;
            if (entry.id) input.dataset.id = entry.id;
            document.getElementById('suggestions').innerHTML = '';
            document.getElementById('weight').focus();
        }

        const modal = document.getElementById('entryModal');
        const form = document.getElementById('entryForm');

        function openModal() {
            modal.style.display = 'flex';
            
            document.getElementById('singleInputs').style.display = currentMode === "single" ? "block" : "none";
            document.getElementById('coopInputs').style.display = currentMode === "coop" ? "block" : "none";

            document.getElementById('entrantInput').value = '';
            document.getElementById('player1Input').value = '';
            document.getElementById('player2Input').value = '';
            document.getElementById('weight').value = '';
            document.getElementById('suggestions').innerHTML = '';

            setTimeout(() => {
                if (currentMode === "single") document.getElementById('entrantInput').focus();
                else document.getElementById('player1Input').focus();
            }, 100);
        }

        document.getElementById('addEntryBtn').onclick = openModal;

        window.onclick = e => {
            if (e.target === modal) modal.style.display = 'none';
        };

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape' && modal.style.display === 'flex') {
                modal.style.display = 'none';
            }
            if ((e.key === 'n' || e.key === '+') && 
                modal.style.display !== 'flex' && 
                !['INPUT','TEXTAREA'].includes(e.target.tagName)) {
                e.preventDefault();
                openModal();
            }
        });

        document.getElementById('entrantInput').addEventListener('input', showSuggestions);
        document.getElementById('entrantInput').addEventListener('keydown', e => {
            const ul = document.getElementById('suggestions');
            const items = ul.children;

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                highlightSuggestion(currentHighlightIndex + 1);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                highlightSuggestion(currentHighlightIndex - 1);
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (currentHighlightIndex >= 0 && items[currentHighlightIndex]) {
                    items[currentHighlightIndex].click();
                } else if (items.length > 0) {
                    items[0].click();
                } else {
                    document.getElementById('weight').focus();
                }
            }
        });

        form.onsubmit = e => {
            e.preventDefault();
            const weightVal = document.getElementById('weight').value.trim();
            if (!weightVal) return;
            const weightNum = parseInt(weightVal);

            const activeBoard = currentMode === "single" ? singleLeaderboard : coopLeaderboard;
            let shouldCelebrate = false;

            if (currentMode === "single") {
                const nameVal = document.getElementById('entrantInput').value.trim();
                if (!nameVal) return;

                let finalName = capitalizeName(nameVal);
                let id = document.getElementById('entrantInput').dataset.id;

                if (!id) {
                    const match = all_entrants.find(e =>
                        e.name.toLowerCase() === nameVal.toLowerCase() ||
                        (e.id && e.id.toLowerCase() === nameVal.toLowerCase())
                    );
                    if (match) {
                        id = match.id;
                        finalName = match.name;
                    } else {
                        id = 'CUST-' + Date.now().toString(36).slice(-6).toUpperCase();
                        const newEntrant = { id, name: finalName };
                        additional_entrants.push(newEntrant);
                        all_entrants.push(newEntrant);
                        saveAdditionalEntrants();
                    }
                }

                const existingIdx = activeBoard.findIndex(e => e.id === id);
                if (existingIdx >= 0) {
                    if (weightNum > activeBoard[existingIdx].weight) {
                        activeBoard[existingIdx].weight = weightNum;
                        shouldCelebrate = true;
                    }
                } else {
                    const entry = { id, name: finalName, weight: weightNum };
                    const source = all_entrants.find(e => e.id === id);
                    if (source?.grade) entry.grade = source.grade;
                    activeBoard.push(entry);
                    shouldCelebrate = true;
                }
            } else {
                const p1 = document.getElementById('player1Input').value.trim();
                const p2 = document.getElementById('player2Input').value.trim();
                if (!p1 || !p2) return;

                const id = 'COOP-' + Date.now().toString(36).slice(-8).toUpperCase();
                const displayName = `${p1} & ${p2}`;

                const existingIdx = activeBoard.findIndex(e => e.id === id);
                if (existingIdx >= 0) {
                    if (weightNum > activeBoard[existingIdx].weight) {
                        activeBoard[existingIdx].weight = weightNum;
                        shouldCelebrate = true;
                    }
                } else {
                    activeBoard.push({ id, player1: p1, player2: p2, name: displayName, weight: weightNum });
                    shouldCelebrate = true;
                }
            }

            activeBoard.sort((a, b) => b.weight - a.weight);
            saveLeaderboard();
            renderLeaderboard(true);

            if (shouldCelebrate) {
                confetti({ particleCount: 300, spread: 110, origin: { y: 0.55 } });
            }

            modal.style.display = 'none';
        };

        let resetConfirmMode = false;
        document.getElementById('resetBtn').onclick = () => {
            const resetBtn = document.getElementById('resetBtn');
            if (!resetConfirmMode) {
                resetConfirmMode = true;
                resetBtn.textContent = "Confirm?";
                setTimeout(() => {
                    if (resetConfirmMode) {
                        resetConfirmMode = false;
                        resetBtn.textContent = "Reset";
                    }
                }, 5000);
            } else {
                if (currentMode === "single") singleLeaderboard = [];
                else coopLeaderboard = [];
                saveLeaderboard();
                renderLeaderboard(true);
                modal.style.display = 'none';
                resetConfirmMode = false;
                resetBtn.textContent = "Reset";
            }
        };

        document.getElementById('modeToggle').addEventListener('click', () => {
            currentMode = currentMode === "single" ? "coop" : "single";
            document.getElementById('modeToggle').textContent = currentMode === "single" ? "Single Player" : "Co-op";
            renderLeaderboard(false);
            broadcastUpdate();
        });

        fetch('../students.json')
            .then(r => r.json())
            .then(students => {
                all_entrants = [...students, ...additional_entrants];
                renderLeaderboard(false);
            })
            .catch(() => {
                all_entrants = [...additional_entrants];
                renderLeaderboard(false);
            });
    </script>
</body>
</html>
