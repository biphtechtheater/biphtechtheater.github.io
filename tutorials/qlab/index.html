<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QLab Tutorials</title>
    <link rel="icon" href="../icons/qlabicon.png">
    
    <!-- Common styles -->
    <link rel="stylesheet" href="../../common-styles.css">
    
    <style>
        :root {
            --bg: #111111;
            --card: #1a1a1a;
            --accent: #9f4bff;
            --accent2: #c084ff;
            --text: #eeeeee;
            --muted: #888888;
            --border: #333333;
        }
        
        body {
            background-color: var(--bg);
            color: var(--text);
        }
        
        .logo {
            color: var(--accent);
        }
        
        #search:focus {
            border-color: var(--accent);
        }
        
        .category-btn.active {
            background: var(--accent);
            border-color: var(--accent);
        }
        
        .video-card:hover {
            border-color: var(--accent);
        }
        
        .play-overlay {
            background: rgba(159, 75, 255, 0.85);
        }
        
        .video-card:hover .play-overlay {
            background: rgba(192, 132, 255, 0.95);
        }
        
        .modal-content {
            border: 2px solid var(--accent);
        }
        
        #modal-title {
            color: var(--accent);
        }
        
        .tag {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div id="shared-menu"></div>
    <script src="../../menu.js"></script>
    <header>
        <div class="logo-icon" style="width: 90px; height: 78px">
            <img src="../icons/qlabicon.png" style="height: 80px;" alt="BIPH Tech Theater Logo">
        </div>
        <div>
            <div class="logo" style="font-size: 1.5em; margin-bottom: 8px">QLab</div>
            <div class="header-subtitle">Tutorial Gallery</div>
        </div>
    </header>

    <div class="controls">
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="search" placeholder="Search tutorials... (press / to focus)" autocomplete="off">
        </div>
        
        <div class="filter-group">
            <button class="category-btn active" data-category="all">All</button>
            <button class="category-btn" data-category="basics">Basics</button>
            <button class="category-btn" data-category="audio">Audio</button>
            <button class="category-btn" data-category="video">Video</button>
            <button class="category-btn" data-category="lighting">Lighting</button>
            <button class="category-btn" data-category="advanced">Advanced</button>
            <button class="category-btn" data-category="network">Network/MIDI</button>
        </div>
    </div>

    <div class="gallery" id="gallery">
        <!-- Populated by JS -->
    </div>

    <!-- Video Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <span class="close-btn" id="close-modal">×</span>
            </div>
            <div id="modal-video" style="position:relative;padding-top:56.25%;background:#000;">
                <!-- YouTube iframe injected here -->
            </div>
            <div style="padding:24px;">
                <div id="modal-description" style="color:#ddd; line-height:1.6;"></div>
                <div id="modal-tags" class="tags" style="margin-top:20px;"></div>
            </div>
        </div>
    </div>

    <script>
        // Your tutorial videos - add as many as you want
        const videos = [
            {
                id: "GQLIq6NoM34",
                title: "QLab Tutorial | Templates",
                category: "basics",
                duration: "1:48",
                keywords: ["templates", "settings", "workspace", "new projects"],
                description: "Getting set up with our custom template that makes life MUCH easier."
            },
            {
                id: "mwLLcSKuOtA",
                title: "QLab Tutorial | Automation - Create cues for subtitles",
                category: "basics",
                duration: "3:36",
                keywords: ["subtitles", "lyrics", "hotkeys", "automation"],
                description: "A lifesaver for porting your script / lyrics over into QLab."
            },
            {
                id: "3acUiQHYWXg",
                title: "QLab Tutorial | Panicking...",
                category: "basics",
                duration: "1:44",
                keywords: ["panic button", "automation", "hotkeys", "templates"],
                description: "A lifesaver for porting your script / lyrics over into QLab."
            }
            // Add more here...
        ];

        function renderGallery(filteredVideos) {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            
            if (filteredVideos.length === 0) {
                gallery.innerHTML = `<div class="no-results">No tutorials found.<br>Try different keywords or filters.</div>`;
                return;
            }
            
            filteredVideos.forEach(video => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <div class="thumbnail-container">
                        <img src="https://img.youtube.com/vi/${video.id}/hqdefault.jpg" alt="${video.title}" class="thumbnail">
                        <div class="play-overlay">▶</div>
                        <div class="duration">${video.duration}</div>
                    </div>
                    <div class="card-content">
                        <div class="card-title">${video.title}</div>
                        <div class="card-meta">
                            <span>${video.category.toUpperCase()}</span>
                        </div>
                        <div class="tags">
                            ${video.keywords.map(kw => `<span class="tag">${kw}</span>`).join('')}
                        </div>
                    </div>
                `;
                card.addEventListener('click', () => openVideoModal(video));
                gallery.appendChild(card);
            });
        }

        function openVideoModal(video) {
            const modal = document.getElementById('modal');
            const modalVideoContainer = document.getElementById('modal-video');
            
            // Autoplay enabled
            modalVideoContainer.innerHTML = `
                <iframe width="100%" height="100%" 
                        style="position:absolute;top:0;left:0;" 
                        src="https://www.youtube.com/embed/${video.id}?autoplay=1&rel=0" 
                        title="${video.title}" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen></iframe>
            `;
            
            document.getElementById('modal-title').textContent = video.title;
            document.getElementById('modal-description').textContent = video.description;
            
            const tagsContainer = document.getElementById('modal-tags');
            tagsContainer.innerHTML = video.keywords.map(kw => `<span class="tag">${kw}</span>`).join('');
            
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function filterVideos() {
            const searchTerm = document.getElementById('search').value.toLowerCase().trim();
            const activeCategory = document.querySelector('.category-btn.active').dataset.category;
            
            const filtered = videos.filter(video => {
                const matchesSearch = !searchTerm || 
                    video.title.toLowerCase().includes(searchTerm) ||
                    video.description.toLowerCase().includes(searchTerm) ||
                    video.keywords.some(kw => kw.toLowerCase().includes(searchTerm));
                
                const matchesCategory = activeCategory === 'all' || video.category === activeCategory;
                
                return matchesSearch && matchesCategory;
            });
            
            renderGallery(filtered);
        }

        // Event Listeners
        document.getElementById('search').addEventListener('input', filterVideos);
        
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                filterVideos();
            });
        });
        
        document.getElementById('close-modal').addEventListener('click', () => {
            const modal = document.getElementById('modal');
            modal.style.display = 'none';
            document.getElementById('modal-video').innerHTML = '';
            document.body.style.overflow = 'visible';
        });
        
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modal')) {
                document.getElementById('close-modal').click();
            }
        });
        
        // Keyboard Shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === '/' && document.getElementById('search') !== document.activeElement) {
                e.preventDefault();
                document.getElementById('search').focus();
            }
            
            if (e.key === 'Escape') {
                const modal = document.getElementById('modal');
                if (modal.style.display === 'flex') {
                    document.getElementById('close-modal').click();
                } else {
                    document.getElementById('search').value = '';
                    document.querySelector('[data-category="all"]').click();
                }
            }
        });
        
        // Initialize
        renderGallery(videos);
    </script>
</body>
</html>
