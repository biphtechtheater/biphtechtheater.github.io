<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upcoming Events</title>
    <link rel="icon" href="../icons/light-icon.png">
    <link rel="stylesheet" href="../common-styles.css">
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --border: #333;
            --text: #eee;
            --muted: #aaa;
            --accent: #9f4bff;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2.6rem;
            font-weight: 200;
            text-align: center;
            margin-bottom: 8px;
        }

        .page-description {
            text-align: center;
            color: var(--muted);
            margin-bottom: 32px;
            font-size: 1.15rem;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: var(--card);
            padding: 10px 24px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .current-month {
            font-size: 1.75rem;
            font-weight: 400;
        }

        .nav-btn {
            background:#0f0f0f46;
            border: 1px solid var(--border);
            color: var(--text);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            background: var(--card);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .weekday {
            text-align: center;
            padding: 10px 6px;
            font-size: 0.92rem;
            color: var(--muted);
            font-weight: 500;
            border-bottom: 1px solid var(--border);
        }

        .day {
            background: #222;
            height: 110px;           /* Fixed rigid height - adjust if needed */
            padding: 8px;
            border-radius: 8px;
            transition: all 0.25s ease;
            cursor: pointer;
            position: relative;
            border: 1px solid transparent;
            display: flex;
            flex-direction: column;
            overflow: hidden;        /* Prevents overflow */
        }

        .day:hover {
            background: #2a2a2a;
            border-color: var(--accent);
        }

        .day.other-month {
            opacity: 0.35;
        }

        .day-number {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 6px;
            flex-shrink: 0;
        }

        .day-event {
            font-size: 0.78rem;
            padding: 2px 7px;
            margin-bottom: 3px;
            border-radius: 4px;
            background: rgba(159, 75, 255, 0.15);
            color: #ddd;
            line-height: 1.25;
            overflow-wrap: break-word;  
            word-break: break-word;
            white-space: normal; 
            display: -webkit-box;
            -webkit-line-clamp: 3; 
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .day-event:last-child {
            margin-bottom: 0;
        }

        .day.today {
            background: rgba(159, 75, 255, 0.109) !important;
            border: 2px solid var(--accent) !important;
            position: relative;
        }

        .day.today::after {
            content: "Today";
            position: absolute;
            top: 6px;
            right: 8px;
            font-size: 0.65rem;
            color: var(--accent);
            font-weight: 600;
            background: rgba(0,0,0,0.4);
            padding: 1px 6px;
            border-radius: 3px;
        }

        .special { color: #ff4d4d; font-weight: 600; }
        .party { color: #ffd700; font-weight: 600; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #1a1a1a;
            width: 90%;
            max-width: 520px;
            border-radius: 12px;
            padding: 28px;
            border: 1px solid var(--accent);
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 2.2rem;
            cursor: pointer;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div id="shared-menu"></div>
    <div id="shared-header"></div>

    <div class="container">
        <!-- <p class="page-description">Upcoming Events — click any day to view details</p> -->

        <div class="calendar-header">
            <button onclick="prevMonth()" class="nav-btn">←</button>
            <h2 id="month-title" class="current-month">October 2026</h2>
            <div style="display: flex; gap: 10px;">
                <button onclick="nextMonth()" class="nav-btn">→</button>
                <button onclick="goToToday()" style="padding: 0 20px; border-radius: 9999px; background: var(--accent); color: #000; font-weight: 600; border: none;">Today</button>
            </div>
        </div>

        <!-- Calendar Grid -->
        <div id="calendar-grid" class="calendar-grid"></div>
    </div>

    <!-- Day Modal -->
    <div id="day-modal" class="modal">
        <div class="modal-content" onclick="event.stopImmediatePropagation()">
            <span onclick="closeModal()" class="close-btn">×</span>
            <h2 id="modal-date" style="margin-bottom: 20px;"></h2>
            <div id="modal-events"></div>
        </div>
    </div>

    <script src="../menu.js"></script>
    <script src="../header.js"></script>
    <script>
        // Event Data (2026–2027)
        const events = {
            "2026-10-23": [{ title: "End of Q1", type: "special" }],
            "2026-10-29": [{ title: "Halloween: Alice in Wonderland", location: "Amphitheatre" }],
            "2026-11-23": [{ title: "Primary Art Exhibition", location: "3rd Floor Gallery" }],
            "2026-11-24": [{ title: "Primary Art Exhibition", location: "3rd Floor Gallery" }],
            "2026-11-25": [{ title: "Primary Art Exhibition", location: "3rd Floor Gallery" }],
            "2026-11-26": [{ title: "Primary Art Exhibition", location: "3rd Floor Gallery" }],
            "2026-11-27": [{ title: "Primary Art Exhibition", location: "3rd Floor Gallery" }],
            "2026-11-28": [{ title: "Primary Art Exhibition", location: "3rd Floor Gallery" }],
            "2026-11-29": [{ title: "Primary Art Exhibition", location: "3rd Floor Gallery" }],
            "2026-11-30": [{ title: "Primary Art Exhibition", location: "3rd Floor Gallery" }],
            "2026-12-09": [{ title: "Winter Art Exhibition", location: "3rd Floor Gallery" }],
            "2026-12-11": [{ title: "Primary Winter Holiday Show", location: "Black Box" }],
            "2026-12-17": [{ title: "Winter Concert (Band + Choir)", location: "Lower Gym" }],
            "2027-01-15": [{ title: "End of Q2", type: "special" }],
            "2027-01-21": [{ title: "Thespian Showcase & Awards", location: "Black Box" }],
            "2027-02-25": [{ title: "Opera Bastien & Bastienne", location: "Auditorium" }],
            "2027-03-11": [{ title: "Advanced/Capstone Play", location: "Black Box" }],
            "2027-03-18": [{ title: "Band Spring Concert", location: "Black Box" }],
            "2027-03-25": [{ title: "Choir Spring Concert", location: "Black Box" }],
            "2027-04-02": [{ title: "End of Q3", type: "special" }],
            "2027-04-14": [{ title: "Musical Theatre Club Performance", location: "Black Box" }],
            "2027-04-15": [{ title: "Musical Theatre Club Performance", location: "Black Box" }],
            "2027-04-28": [{ title: "Upper Primary Play", location: "Black Box" }],
            "2027-06-10": [{ title: "BIPH Talent Show", location: "Lower Gym" }, { title: "End of Year!", type: "party" }]
        };

        let currentDate = new Date(2026, 9, 1); // October 2026

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            days.forEach(day => {
                const el = document.createElement('div');
                el.className = 'weekday';
                el.textContent = day;
                grid.appendChild(el);
            });

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            document.getElementById('month-title').textContent = 
                currentDate.toLocaleString('default', { month: 'long' }) + ' ' + year;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();

            for (let i = firstDay - 1; i >= 0; i--) {
                grid.appendChild(createDayElement(daysInPrevMonth - i, month - 1, year, true));
            }

            const today = new Date();
            for (let day = 1; day <= daysInMonth; day++) {
                grid.appendChild(createDayElement(day, month, year, false, today));
            }

            const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
            const remaining = totalCells - (firstDay + daysInMonth);
            for (let day = 1; day <= remaining; day++) {
                grid.appendChild(createDayElement(day, month + 1, year, true));
            }
        }

        function createDayElement(day, month, year, isOtherMonth, today = null) {
            const dateStr = `${year}-${String(month+1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const dayEl = document.createElement('div');
            dayEl.className = `day ${isOtherMonth ? 'other-month' : ''}`;

            if (today && today.getFullYear() === year && today.getMonth() === month && today.getDate() === day) {
                dayEl.classList.add('today');
            }

            const numEl = document.createElement('div');
            numEl.className = 'day-number';
            numEl.textContent = day;
            dayEl.appendChild(numEl);

            const eventsContainer = document.createElement('div');
            eventsContainer.style.flex = '1';
            eventsContainer.style.display = 'flex';
            eventsContainer.style.flexDirection = 'column';
            eventsContainer.style.gap = '2px';
            // eventsContainer.style.overflow = 'hidden';

            if (events[dateStr]) {
                events[dateStr].forEach(ev => {
                    const evEl = document.createElement('div');
                    evEl.className = 'day-event';
                    if (ev.type === 'special') evEl.classList.add('special');
                    if (ev.type === 'party') evEl.classList.add('party');
                    evEl.textContent = ev.title;
                    eventsContainer.appendChild(evEl);
                });
            }

            dayEl.appendChild(eventsContainer);
            dayEl.onclick = () => showDayModal(dateStr, day, month, year);
            return dayEl;
        }

        function showDayModal(dateStr, day, month, year) {
            const modal = document.getElementById('day-modal');
            const dateObj = new Date(year, month, day);
            
            document.getElementById('modal-date').textContent = 
                dateObj.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

            const container = document.getElementById('modal-events');
            container.innerHTML = '';

            if (events[dateStr]) {
                events[dateStr].forEach(ev => {
                    const item = document.createElement('div');
                    item.style.marginBottom = '18px';
                    item.style.padding = '16px';
                    item.style.background = '#222';
                    item.style.borderRadius = '8px';
                    item.innerHTML = `
                        <div style="font-weight: 600; font-size: 1.25rem; margin-bottom: 8px;">${ev.title}</div>
                        ${ev.location ? `<div style="color: #6cb0ff;">📍 ${ev.location}</div>` : ''}
                    `;
                    container.appendChild(item);
                });
            } else {
                container.innerHTML = '<p style="color: var(--muted); text-align: center; padding: 40px 0;">No events on this day.</p>';
            }

            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('day-modal').style.display = 'none';
        }

        function prevMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        }

        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        }

        function goToToday() {
            currentDate = new Date();
            currentDate.setDate(1);
            renderCalendar();
        }

        // Keyboard Shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.metaKey && e.key === "ArrowLeft") { e.preventDefault(); prevMonth(); }
            if (e.metaKey && e.key === "ArrowRight") { e.preventDefault(); nextMonth(); }
            if (e.key.toLowerCase() === "t") { e.preventDefault(); goToToday(); }
            if (e.key === "Escape") {
                if (document.getElementById('day-modal').style.display === 'flex') closeModal();
            }
        });

        document.getElementById('day-modal').addEventListener('click', function(e) {
            if (e.target.id === 'day-modal') closeModal();
        });

        // Initialize
        window.onload = function() {
            renderCalendar();
            console.log('%cBIPH Calendar ready 🎭', 'color: #9f4bff; font-size: 14px;');
        };
    </script>
</body>
</html>
